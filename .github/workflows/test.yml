name: Tests

on:
    push:
        branches: [main, dev]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Install Dependencies
              run: npm ci
            - name: Run Tests
              run: npm test
