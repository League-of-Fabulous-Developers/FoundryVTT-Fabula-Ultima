name: Tests

on: [push, pull_request]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Install Dependencies
              run: npm ci
            - name: Run Unit Tests
              run: npm test
